version: '3.8'

# Development docker-compose - only runs the database
# Run the Next.js app locally with `pnpm dev`

services:
  db:
    image: postgres:16-alpine
    container_name: valesanchez-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: valesanchez_fit
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d valesanchez_fit"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
